<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sucesso!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='unified.css') }}">
</head>
<body class="page-shell">
    <div class="auth-wrap">
        {% include '_top_nav.html' %}
        <div class="auth-card-wrap">
            <div class="success-card state-card">
                <h1>Obrigado, {{ nome }}!</h1>
                <p class="lead">Seu requerimento foi enviado com sucesso.</p>

                <div class="alert alert-info">
                    <strong>O número do seu pedido é:</strong>
                    <h2 class="display-4 m-0">{{ os_numero }}</h2>
                </div>

                <p class="mt-4">Nossa equipe já foi notificada.</p>

                <a href="/" class="btn btn-outline-primary mt-3">Fazer um novo requerimento</a>
                <a href="{{ url_for('os.consultar_pedido', numero_pedido=os_numero) }}" class="btn btn-info mt-3">
                    Consultar Status
                </a>
            </div>
        </div>

        <footer class="page-footer open-form-footer">
            <span>Paulo Vieira 2025</span>
        </footer>
    </div>

</body>
</html>

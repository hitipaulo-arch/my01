<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Arquivo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='unified.css') }}">
</head>
<body class="page-shell">
    <div class="page-wrap">
        {% include '_top_nav.html' %}

        <div class="form-card">
            <h2 class="text-center">Envio de Arquivos</h2>
            <p class="text-muted text-center">Use esta página para anexar documentos de apoio para a equipe.</p>

            {% if mensagem %}
            <div class="alert alert-{{ tipo_mensagem or 'info' }} mt-3" role="alert">
                {{ mensagem }}
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('os.upload_documento') }}" enctype="multipart/form-data" class="mt-4">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

                <div class="mb-3">
                    <label for="arquivo" class="form-label">Arquivo</label>
                    <input class="form-control" type="file" id="arquivo" name="arquivo" required>
                    <small class="text-muted">Formatos permitidos: PDF, DOC, DOCX, TXT, PNG, JPG, JPEG, WEBP, XLSX, XLS. Limite de 10 MB.</small>
                </div>

                <button class="w-100 btn btn-lg btn-primary" type="submit">Enviar Arquivo</button>
            </form>
        </div>

        <footer class="page-footer">
            <span>Paulo Vieira 2025</span>
        </footer>
    </div>
</body>
</html>
